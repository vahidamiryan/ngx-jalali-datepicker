name: Release (publish to npm)

# Publishes @vahidamirian/datepicker-core, @vahidamirian/ngx-jalali-datepicker and @vahidamirian/vue-datepicker to npm. Trigger manually and
# choose which packages to publish, or push a tag like v1.2.3 to publish all.
on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Space-separated packages to publish (default: all)'
        required: false
        default: '@vahidamirian/datepicker-core @vahidamirian/ngx-jalali-datepicker @vahidamirian/vue-datepicker'
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install
        run: npm ci

      # Build in dependency order. @vahidamirian/datepicker-core must be built first because the
      # framework packages resolve its types/JS.
      - name: Build core
        run: npm run build -w @vahidamirian/datepicker-core
      - name: Build Angular
        run: npx ng build angular
      - name: Build Vue
        run: npm run build -w @vahidamirian/vue-datepicker

      # Publish. @vahidamirian/datepicker-core ships from packages/core; @vahidamirian/ngx-jalali-datepicker from the
      # ng-packagr output in dist/angular; @vahidamirian/vue-datepicker from packages/vue.
      - name: Publish @vahidamirian/datepicker-core
        run: npm publish -w @vahidamirian/datepicker-core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vahidamirian/ngx-jalali-datepicker
        run: npm publish ./dist/angular --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vahidamirian/vue-datepicker
        run: npm publish -w @vahidamirian/vue-datepicker --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
