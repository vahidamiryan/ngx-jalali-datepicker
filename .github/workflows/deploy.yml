name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manually triggering the workflow from the GitHub UI.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build core package (docs alias source, but build validates it)
        run: npm run build -w @vahidamiryan/datepicker-core

      - name: Build Angular package (docs mounts its FESM bundle as live islands)
        run: npm run build -w @vahidamiryan/ngx-jalali-datepicker

      - name: Build VitePress Docs
        run: npm run build -w @vahidamiryan/docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/docs/.vitepress/dist
