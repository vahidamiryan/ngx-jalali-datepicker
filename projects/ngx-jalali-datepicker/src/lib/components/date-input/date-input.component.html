<div class="ndp-input" [class.ndp-input--disabled]="disabled()">
  <div class="ndp-input__fields">
    <input
      #startEl
      type="text"
      class="ndp-input__field"
      [class.ndp-input__field--invalid]="startInvalid()"
      [id]="inputId()"
      [value]="startText()"
      [placeholder]="fieldPlaceholder()"
      [disabled]="disabled()"
      autocomplete="off"
      inputmode="numeric"
      aria-haspopup="dialog"
      [attr.aria-expanded]="open()"
      [attr.aria-invalid]="startInvalid()"
      (input)="onInput('start', startEl.value)"
      (focus)="onFocus('start')"
      (blur)="onBlur()"
    />

    @if (isRange()) {
      <span class="ndp-input__sep" aria-hidden="true">←</span>
      <input
        #endEl
        type="text"
        class="ndp-input__field"
        [class.ndp-input__field--invalid]="endInvalid()"
        [value]="endText()"
        [placeholder]="fieldPlaceholder()"
        [disabled]="disabled()"
        autocomplete="off"
        inputmode="numeric"
        aria-haspopup="dialog"
        [attr.aria-expanded]="open()"
        [attr.aria-invalid]="endInvalid()"
        (input)="onInput('end', endEl.value)"
        (focus)="onFocus('end')"
        (blur)="onBlur()"
      />
    }

    <button
      type="button"
      class="ndp-input__toggle"
      aria-label="باز کردن تقویم"
      [attr.aria-expanded]="open()"
      [disabled]="disabled()"
      (click)="toggle()"
    >
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <path d="M3 9h18M8 2v4M16 2v4" />
      </svg>
    </button>
  </div>

  @if (open()) {
    <button type="button" class="ndp-input__backdrop" aria-label="بستن" (click)="close()"></button>
    <div class="ndp-input__popover" role="dialog">
      <ndp-datepicker
        [theme]="theme()"
        [customVars]="customVars()"
        [mode]="mode()"
        [animation]="animation()"
        [numberOfMonths]="numberOfMonths()"
        [min]="min()"
        [max]="max()"
        [dateFilter]="dateFilter()"
        [showSecondaryDate]="showSecondaryDate()"
        [secondaryCalendar]="secondaryCalendar()"
        [showFooter]="showFooter()"
        [showTime]="showTime()"
        [minuteStep]="minuteStep()"
        [calendar]="calendar()"
        (calendarChange)="calendar.set($event)"
        [value]="value()"
        (valueChange)="onPanelValue($event)"
        (dateSelected)="onPanelSelected($event)"
      />
    </div>
  }
</div>
